linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gocyclo
    - gosec
    - goimports
    - misspell
    - unconvert
    - predeclared
    - ineffassign
    - unused
    - gocritic
    - noctx

linters-settings:
  gocyclo:
    min-complexity: 20

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocyclo
        - revive
